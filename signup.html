{% extends 'base.html' %}
{% block content %}

<div class="auth-container">

    <h2>Create Account</h2>

    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn primary full">Sign Up</button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </p>

</div>

{% endblock %}
