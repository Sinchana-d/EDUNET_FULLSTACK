{% extends "base.html" %}
{% load static %}
{% block content %}

<div style="position:absolute; top:100px; left:50%; transform:translateX(-50%); z-index:1000;">
    <input type="text" id="searchInput" placeholder="Search location..."
        style="padding:8px;border-radius:8px;border:1px solid #ccc;">
    <button onclick="searchLocation()"
        style="padding:8px 12px;border:none;border-radius:8px;background:#5a4e7c;color:white;">
        Search
    </button>
</div>

<div id="map" style="height:85vh;width:100%;border-radius:15px;margin-top:20px;"></div>

<div class="pin-form-container">
    <form id="pinForm" method="POST" enctype="multipart/form-data" action="{% url 'add_pin' %}"
        style="display:none;margin:20px;">
        {% csrf_token %}
        <input type="hidden" name="latitude" id="lat">
        <input type="hidden" name="longitude" id="lng">

        <div class="form-group">
            <input type="text" name="title" placeholder="Title" required>
        </div>

        <div class="form-group">
            <textarea name="description" placeholder="Description"></textarea>
        </div>

        <div class="form-group">
            <select name="category">
                <option value="Food">Food</option>
                <option value="Vacation">Vacation</option>
                <option value="Business">Business</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Upload Images</label>
            <input type="file" name="images" class="file-input" multiple>
        </div>

        <div class="form-group">
            <label>Upload Videos</label>
            <input type="file" name="videos" class="file-input" multiple>
        </div>

        <div class="form-group">
            <label>Upload Music</label>
            <input type="file" name="music" class="file-input" multiple>
        </div>
        <button type="submit" class="save-btn">Save Pin</button>
    </form>
</div>


{{ pins|json_script:"pins-data" }}

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    /* ================= MAP INIT ================= */
    var map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);


    /* ================= SAFE DJANGO DATA ================= */
    var pins = JSON.parse(document.getElementById('pins-data').textContent);

    pins.forEach(function (pin) {
        L.marker([pin.latitude, pin.longitude]).addTo(map)
            .bindPopup(
                "<b>" + pin.title + "</b><br>" +
                pin.description + "<br>" +
                "<strong>Category:</strong> " + pin.category + "<br><br>" +
                "<a href='/edit-pin/" + pin.id + "/'>Edit</a> | " +
                "<a href='/delete-pin/" + pin.id + "/'>Delete</a>"
            );
    });


    /* ================= MAP CLICK ================= */
    map.on('click', function (e) {

        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        // Fill hidden fields
        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        // Show form
        var form = document.getElementById("pinForm");
        form.style.display = "block";

        // Scroll to form
        form.scrollIntoView({ behavior: "smooth" });

        // Temporary marker
        if (window.tempMarker) {
            map.removeLayer(window.tempMarker);
        }

        window.tempMarker = L.marker([lat, lng]).addTo(map);

    });


    /* ================= SEARCH ================= */
    function searchLocation() {
        var query = document.getElementById("searchInput").value;

        fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + query)
            .then(response => response.json())
            .then(data => {
                if (data.length > 0) {
                    map.setView([data[0].lat, data[0].lon], 10);
                } else {
                    alert("Location not found");
                }
            });
    }
</script>

{% endblock %}
