{% extends 'base.html' %}
{% block content %}

<div class="logout-container">
    <div class="logout-card">

        <h2>Logout Confirmation</h2>
        <p>Are you sure you want to logout?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn danger full">
                Yes, Logout
            </button>
        </form>

        <a href="{% url 'home' %}" class="btn secondary full">
            Cancel
        </a>

    </div>
</div>

{% endblock %}
